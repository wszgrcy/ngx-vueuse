name: publish
on:
  push:
    branches:
      - 'main'
      - 'alpha'
permissions:
  id-token: write
  contents: write
env:
  PUBLISH_TAG: ${{ github.ref_name == 'main' && 'latest' || 'alpha' }}
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: init
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@gmail.com"
      - uses: actions/checkout@v6
      - name: install-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      - run: npm i
      - run: npx playwright install --with-deps
      - run: npm test
      - run: npm run build
      - id: publish
        name: publish
        uses: JS-DevTools/npm-publish@v4
        with:
          package: ./dist/vueuse-lib/package.json
          provenance: true
          access: public
      - if: steps.publish.outputs.old-version != steps.publish.outputs.version
        run: |
          echo "[${{ steps.publish.outputs.type }}]Version changed: ${{ steps.publish.outputs.old-version }} => ${{ steps.publish.outputs.version }}"
          git tag v${{steps.publish.outputs.version}}
          git push origin v${{steps.publish.outputs.version}}
