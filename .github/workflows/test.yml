name: test
on:
  push:
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - run: npm i
      - run: npx playwright install --with-deps
      - run: npm run build
      - name: test
        run: npm run test
